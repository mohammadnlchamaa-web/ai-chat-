<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro AI Chat</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <button id="new-chat-btn" type="button">+ New Chat</button>
    <div id="chat-list" aria-label="Chat history list"></div>
  </aside>

  <!-- Main Chat Area -->
  <main class="main">

    <section id="chat-box" aria-live="polite"></section>

    <!-- Input Area -->
    <footer class="input-area">
      <input
        id="user-input"
        type="text"
        placeholder="Type your message..."
        aria-label="Message input"
        autocomplete="off"
      />

      <button id="send-btn" type="button">Send</button>
    </footer>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
