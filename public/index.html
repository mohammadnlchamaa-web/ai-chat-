<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <button id="new-chat-btn">+ New Chat</button>
    <div id="chat-list"></div>
  </aside>

  <main class="main">

    <div id="home-screen">
      <h1>What can I help with?</h1>

      <div class="home-buttons">
        <button id="btn-quiz">🧠 Quiz</button>
        <button id="btn-homework">📘 Homework</button>
        <button id="btn-write">✍️ Write</button>
        <button id="btn-summarize">📌 Summarize</button>
      </div>

      <div class="home-input">
        <input id="home-input" placeholder="Message AI..." />
        <button id="home-send">➜</button>
      </div>
    </div>

    <div id="chat-box"></div>

    <form id="chat-form">
      <input id="user-input" placeholder="Message..." />
      <button type="submit">➜</button>
    </form>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
