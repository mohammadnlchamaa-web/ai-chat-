<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="home">

<button id="menu-btn">☰</button>

<div class="app">

  <aside class="sidebar">
    <button id="new-chat-btn">+ New Chat</button>
    <div id="chat-list"></div>
  </aside>

  <div id="overlay"></div>

  <main class="main">

    <!-- HOME -->
    <div id="home-screen">
      <h1>What can I help with?</h1>

      <div class="home-buttons">
        <button onclick="startMode('quiz')">🧠 Make a quiz</button>
<button onclick="startMode('homework')">📘 Help with homework</button>
<button onclick="startMode('write')">✍️ Help write</button>
<button onclick="startMode('summarize')">📌 Summarize</button>
      </div>

      <input id="home-input" placeholder="Ask anything..." />
    </div>

    <!-- CHAT -->
    <section id="chat-box"></section>

    <!-- INPUT -->
    <form id="chat-form" class="input-area">
      <input id="user-input" type="text" placeholder="Message..." />
      <button type="submit">➤</button>
      <button type="button" id="voice-btn">🎤</button>
    </form>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
