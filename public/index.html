<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e293b">

  <title>AI Chat</title>

  <link rel="stylesheet" href="style.css?v=11">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button id="new-chat-btn">+ New Chat</button>
    <div id="chat-list"></div>
  </aside>

  <div id="overlay"></div>

  <!-- MAIN -->
  <main class="main">

    <button id="menu-btn">☰</button>

    <!-- HOME -->
    <div id="home-screen">
      <h1>What are you working on?</h1>
      <input id="home-input" placeholder="Ask anything" />
    </div>

    <!-- CHAT -->
    <section id="chat-box"></section>

    <!-- INPUT -->
    <form id="chat-form" class="input-area">
      <input id="user-input" type="text" placeholder="Type message..." autocomplete="off" />
      <button type="submit">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
    <path d="M4 12L20 12" stroke="white" stroke-width="2"/>
    <path d="M14 6L20 12L14 18" stroke="white" stroke-width="2"/>
  </svg>
</button>
    </form>

  </main>

</div>

</html>
